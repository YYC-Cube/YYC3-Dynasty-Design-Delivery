name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel any superseded run on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      # The repo's supportedArchitectures pins linux/{x64,arm64}/glibc, which is
      # exactly what ubuntu-latest provides — no extra config needed here.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Circular dependency scan
        run: pnpm madge

      - name: Build
        run: pnpm build

      # Optional: keep the build artifact for download / deploy debugging.
      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7
